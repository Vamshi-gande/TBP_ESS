

services:
  # ── PostgreSQL Database ─────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: sentinel_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel_secret
      POSTGRES_DB: surveillance
    ports:
      - "5434:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d surveillance"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Backend API ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://sentinel:sentinel_secret@db:5432/surveillance
    # NOTE: Inside Docker network, the DB port is still 5432.
    # The host mapping is 5433:5432 to avoid conflicts.
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage

volumes:
  pg_data:
